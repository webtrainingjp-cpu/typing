    <script src="js/course-nav.js?v=20260317"></script>
    <script>
      // ==============================
      // URLパラメータ取得
      // ==============================
      const params = new URLSearchParams(location.search);
      const courseKey = params.get("course");

      const courseTitleEl = document.getElementById("courseTitle");
      const rankingList = document.getElementById("rankingList");
      const currentPlayerName = localStorage.getItem("wt_player_name") || "";

      if (!courseKey) {
        location.href = "ranking.html?course=html";
      } else {
        const displayCourseName = courseKey
          .replace(/_/g, " ")
          .replace(/\b\w/g, (char) => char.toUpperCase());
        courseTitleEl.textContent = `${displayCourseName}ランキング`;
      }

      // ==============================
      // ランキング取得
      // ==============================
      async function fetchRanking() {
        const url = new URL("api/get-ranking.php", location.href);

        if (courseKey) {
          url.searchParams.set("course", `${courseKey}_rank`);
        }

        const response = await fetch(url.toString());

        if (!response.ok) {
          throw new Error(`get-ranking failed: ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error(data.error || "ランキングデータの取得に失敗しました");
        }

        return data;
      }

      // ==============================
      // ランキング描画
      // ==============================
      function renderRanking(list) {
        if (list.length === 0) {
          rankingList.innerHTML = "<p>まだランキングはありません。</p>";
          return;
        }

        let html = `
        <table class="table table-dark table-striped">
          <thead>
            <tr>
              <th>順位</th>
              <th>名前</th>
              <th>スコア</th>
              <th>進捗</th>
              <th>コース</th>
              <th>制限時間</th>
            </tr>
          </thead>
          <tbody>
      `;

        list.forEach((item, index) => {
          const displayCourse = String(item.course || "").replace(/_rank$/, "");
          const isCurrentPlayer =
            currentPlayerName &&
            String(item.name || "") === String(currentPlayerName);
          const progressCurrent = Number(item.progress_current) || 0;
          const progressTotal = Number(item.progress_total) || 0;
          const progressText = `${progressCurrent}/${progressTotal}`;
          let progressClass = "text-bg-danger";

          if (progressTotal > 0 && progressCurrent >= progressTotal) {
            progressClass = "text-bg-success";
          } else if (
            progressTotal > 0 &&
            progressCurrent >= progressTotal / 2
          ) {
            progressClass = "text-bg-warning";
          }
          const rankNumber = index + 1;
          const rankClass =
            rankNumber === 1
              ? "rank-cell rank-1"
              : rankNumber === 2
                ? "rank-cell rank-2"
                : rankNumber === 3
                  ? "rank-cell rank-3"
                  : "rank-cell";
          const rankIcon =
            rankNumber <= 3 ? '<i class="fa-solid fa-crown"></i>' : "";
          html += `
          <tr class="${isCurrentPlayer ? "table-warning" : ""}">
            <td class="${rankClass}">${rankIcon}<span>${rankNumber}位</span></td>
            <td>${escapeHTML(String(item.name || "-"))}</td>
            <td>${Number(item.score) || 0}</td>
            <td><span class="badge ${progressClass}">${progressText}</span></td>
            <td>${escapeHTML(displayCourse)}</td>
            <td>${Number(item.time) || 0}秒</td>
          </tr>
        `;
        });

        html += `
          </tbody>
        </table>
      `;

        rankingList.innerHTML = html;
      }

      // ==============================
      // HTMLエスケープ
      // ==============================
      function escapeHTML(str) {
        return str
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      // ==============================
      // 初期表示
      // ==============================
      fetchRanking()
        .then((ranking) => {
          renderRanking(ranking);
        })
        .catch((error) => {
          rankingList.innerHTML = `<p class="text-danger">${escapeHTML(
            error.message,
          )}</p>`;
        });

      if (typeof window.applyCourseNavState === "function") {
        window.applyCourseNavState({ courseKey });
      }
    </script>
