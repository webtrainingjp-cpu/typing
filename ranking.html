    <!-- ================= JS ================= -->
    <script>
      // ==============================
      // URLパラメータ取得
      // ==============================
      const params = new URLSearchParams(location.search);
      const courseKey = params.get("course");
      const myScore = Number(params.get("score"));

      const courseTitleEl = document.getElementById("courseTitle");
      const entryArea = document.getElementById("entryArea");
      const entryBtn = document.getElementById("entryBtn");
      const playerNameInput = document.getElementById("playerName");
      const entryMessage = document.getElementById("entryMessage");
      const rankingList = document.getElementById("rankingList");

      if (!courseKey) {
        location.href = "ranking.html?course=html";
      } else {
        courseTitleEl.textContent = courseKey.toUpperCase() + "の記録";
      }

      // ==============================
      // localStorageキー
      // ==============================
      function getRankingKey() {
        return `ranking_${courseKey}`;
      }

      // ==============================
      // ランキング取得
      // ==============================
      function getRanking() {
        return JSON.parse(localStorage.getItem(getRankingKey())) || [];
      }

      // ==============================
      // ランキング保存
      // ==============================
      function saveRanking(name, score) {
        let list = getRanking();

        // 同一名を探す
        const existingIndex = list.findIndex((item) => item.name === name);

        if (existingIndex !== -1) {
          // 既にある場合 → 高いスコアだけ残す
          if (score > list[existingIndex].score) {
            list[existingIndex].score = score;
            list[existingIndex].date = Date.now();
          }
        } else {
          // 初登場なら追加
          list.push({
            name,
            score,
            date: Date.now(),
          });
        }

        // ソート
        list.sort((a, b) => b.score - a.score);

        // 上位10件だけ
        list = list.slice(0, 10);

        localStorage.setItem(getRankingKey(), JSON.stringify(list));

        return list;
      }

      // ==============================
      // ランキング描画
      // ==============================
      function renderRanking(list) {
        if (list.length === 0) {
          rankingList.innerHTML = "<p>まだランキングはありません。</p>";
          return;
        }

        let html = `
        <table class="table table-dark table-striped">
          <thead>
            <tr>
              <th>順位</th>
              <th>名前</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody>
      `;

        list.forEach((item, index) => {
          const isMe = item.score === myScore;
          html += `
          <tr class="${isMe ? "table-primary" : ""}">
            <td>${index + 1}</td>
            <td>${escapeHTML(item.name)}</td>
            <td>${item.score}</td>
          </tr>
        `;
        });

        html += `
          </tbody>
        </table>
      `;

        rankingList.innerHTML = html;
      }

      // ==============================
      // HTMLエスケープ
      // ==============================
      function escapeHTML(str) {
        return str
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      // ==============================
      // 初期表示
      // ==============================
      const ranking = getRanking();
      renderRanking(ranking);

      // スコア付きで来た場合のみ参加フォーム表示
      if (courseKey && myScore > 0) {
        entryArea.classList.remove("d-none");

        entryBtn.addEventListener("click", () => {
          const name = playerNameInput.value;

          // 空チェック
          if (!name.trim()) {
            entryMessage.textContent = "名前を入力してください";
            entryMessage.className = "text-danger";
            return;
          }

          // スペース禁止
          if (/\s/.test(name)) {
            entryMessage.textContent = "スペースは使用できません";
            entryMessage.className = "text-danger";
            return;
          }

          // 使用可能文字チェック
          const validPattern = /^[A-Za-z0-9ぁ-んァ-ヶ一-龠々ー]+$/;

          if (!validPattern.test(name)) {
            entryMessage.textContent =
              "使用できるのは英字・数字・日本語のみです";
            entryMessage.className = "text-danger";
            return;
          }

          const updated = saveRanking(name, myScore);
          renderRanking(updated);

          entryMessage.textContent = "ランキングに登録しました！";
          entryMessage.className = "text-success";
          entryBtn.disabled = true;
        });
      }

      // ==============================
      // 左ナビ：選択中コースをアクティブ表示
      // ==============================
      document.querySelectorAll("nav a[href*='course=']").forEach((link) => {
        const url = new URL(link.href);
        const navCourse = url.searchParams.get("course");

        if (navCourse === courseKey) {
          link.classList.add("fw-bold", "text-info");
        }
      });

      // ==============================
      // ランキング左ナビ：タブ切り替え
      // ==============================
      const tabBasic = document.getElementById("tab-basic");
      const tabModern = document.getElementById("tab-modern");
      const basicCourses = document.getElementById("basic-courses");
      const modernCourses = document.getElementById("modern-courses");

      function switchTab(type) {
        if (type === "modern") {
          basicCourses.style.display = "none";
          modernCourses.style.display = "block";
          tabModern.classList.add("active");
          tabBasic.classList.remove("active");
        } else {
          basicCourses.style.display = "block";
          modernCourses.style.display = "none";
          tabBasic.classList.add("active");
          tabModern.classList.remove("active");
        }
      }

      tabBasic.addEventListener("click", () => switchTab("basic"));
      tabModern.addEventListener("click", () => switchTab("modern"));

      document.querySelectorAll(".wt-course-btn").forEach((btn) => {
        const url = new URL(btn.href);
        if (url.searchParams.get("course") === courseKey) {
          btn.classList.add("active");
        }
      });
    </script>
