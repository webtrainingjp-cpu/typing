    <script src="js/course-nav.js?v=20260317"></script>
    <script>
      // ==============================
      // URLパラメータ取得
      // ==============================
      const params = new URLSearchParams(location.search);
      const courseKey = params.get("course");

      const courseTitleEl = document.getElementById("courseTitle");
      const myRankEl = document.getElementById("myRank");
      const rankingList = document.getElementById("rankingList");
      const retryRankBtn = document.getElementById("retryRankBtn");
      const currentPlayerName = localStorage.getItem("wt_player_name") || "";
      const latestRankingResultKey = courseKey
        ? `wt_latest_ranking_result_${courseKey}`
        : "";

      if (!courseKey) {
        location.href = "ranking.html?course=html";
      } else {
        const displayCourseName = courseKey
          .replace(/_/g, " ")
          .replace(/\b\w/g, (char) => char.toUpperCase());
        courseTitleEl.textContent = `${displayCourseName}ランキング（100秒チャレンジ）`;
        if (retryRankBtn) {
          retryRankBtn.href = `typing-rank.html?course=${encodeURIComponent(
            `${courseKey}_rank`,
          )}`;
        }
      }

      // ==============================
      // ランキング取得
      // ==============================
      async function fetchRanking() {
        const url = new URL("api/get-ranking.php", location.href);

        if (courseKey) {
          url.searchParams.set("course", `${courseKey}_rank`);
          url.searchParams.set("time", "100");
        }

        const latestResult = getLatestRankingResult();
        if (
          latestResult &&
          latestResult.score !== undefined &&
          latestResult.score !== null &&
          latestResult.created_at
        ) {
          url.searchParams.set(
            "my_name",
            String(latestResult.name || currentPlayerName || ""),
          );
          url.searchParams.set("my_score", String(latestResult.score));
          url.searchParams.set("my_created_at", latestResult.created_at);
        }

        const response = await fetch(url.toString());

        if (!response.ok) {
          throw new Error(`get-ranking failed: ${response.status}`);
        }

        const data = await response.json();

        if (Array.isArray(data)) {
          return {
            ranking: data,
            myRank: null,
          };
        }

        if (!Array.isArray(data.ranking)) {
          throw new Error(data.error || "ランキングデータの取得に失敗しました");
        }

        return {
          ranking: data.ranking,
          myRank: data.my_rank || null,
        };
      }

      // ==============================
      // ランキング描画
      // ==============================
      function getLatestRankingResult() {
        if (!latestRankingResultKey) return null;

        try {
          const raw = localStorage.getItem(latestRankingResultKey);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function renderMyRank(myRank) {
        if (!myRankEl) return;

        if (!myRank || !Number.isFinite(Number(myRank.rank))) {
          myRankEl.textContent = "あなたの順位：--（直前の結果がありません）";
          return;
        }

        const scoreText = Number(myRank.score) || 0;
        myRankEl.textContent = myRank.in_top_10
          ? `あなたの順位：${myRank.rank}位（スコア：${scoreText}）`
          : `あなたの順位：${myRank.rank}位（TOP10圏外）`;
      }

      function renderRanking(list) {
        if (list.length === 0) {
          rankingList.innerHTML = "<p>まだランキングはありません。</p>";
          return;
        }

        let html = `
        <table class="table table-dark table-striped">
          <thead>
            <tr>
              <th>順位</th>
              <th>名前</th>
              <th>スコア</th>
              <th>正解率</th>
            </tr>
          </thead>
          <tbody>
      `;

        let displayRank = 0;
        let prevScore = null;

        list.forEach((item, index) => {
          const isCurrentPlayer =
            currentPlayerName &&
            String(item.name || "") === String(currentPlayerName);
          const rowScore = Number(item.score) || 0;
          const correctCount = Number(item.progress_current) || 0;
          const totalCount = Number(item.progress_total) || 0;
          const accuracy =
            totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;

          if (prevScore === null || rowScore !== prevScore) {
            displayRank = index + 1;
            prevScore = rowScore;
          }

          const rankNumber = displayRank;
          const rankClass =
            rankNumber === 1
              ? "rank-cell rank-1"
              : rankNumber === 2
                ? "rank-cell rank-2"
                : rankNumber === 3
                  ? "rank-cell rank-3"
                  : "rank-cell";
          const rankIcon =
            rankNumber <= 3 ? '<i class="fa-solid fa-crown"></i>' : "";
          html += `
          <tr class="${isCurrentPlayer ? "table-warning" : ""}">
            <td class="${rankClass}">${rankIcon}<span>${rankNumber}位</span></td>
            <td>${escapeHTML(String(item.name || "-"))}</td>
            <td>${rowScore}</td>
            <td><span class="badge text-bg-info">${accuracy}%</span></td>
          </tr>
        `;
        });

        html += `
          </tbody>
        </table>
      `;

        rankingList.innerHTML = html;
      }

      // ==============================
      // HTMLエスケープ
      // ==============================
      function escapeHTML(str) {
        return str
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      // ==============================
      // 初期表示
      // ==============================
      fetchRanking()
        .then(({ ranking, myRank }) => {
          renderMyRank(myRank);
          renderRanking(ranking);
        })
        .catch((error) => {
          renderMyRank(null);
          rankingList.innerHTML = `<p class="text-danger">${escapeHTML(
            error.message,
          )}</p>`;
        });

      if (typeof window.applyCourseNavState === "function") {
        window.applyCourseNavState({ courseKey });
      }
    </script>
